<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Schematic Detektor Urutan 1110 - Rapi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }
    svg {
      background: #fff;
      border: 1px solid #ccc;
      display: block;
      margin: auto;
    }
    .gate {
      fill: #d0e1f9;
      stroke: #1a3e72;
      stroke-width: 2;
      rx: 10;
      ry: 10;
    }
    .flipflop {
      fill: #f9f1d0;
      stroke: #a67c00;
      stroke-width: 2;
      rx: 10;
      ry: 10;
    }
    .wire {
      stroke: #000;
      stroke-width: 2;
      fill: none;
    }
    .label {
      font-weight: bold;
      font-size: 14px;
      user-select: none;
      pointer-events: none;
    }
    .input-circle {
      fill: #4caf50;
      stroke: #2e7d32;
      stroke-width: 2;
    }
    .output-circle {
      fill: #f44336;
      stroke: #b71c1c;
      stroke-width: 2;
    }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Schematic Detektor Urutan Bit 1110 (Input W, Output Z)</h2>
  <svg width="900" height="450" viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">

    <!-- Input W -->
    <circle cx="50" cy="50" r="18" class="input-circle" />
    <text x="50" y="55" text-anchor="middle" fill="#fff" font-weight="bold" font-size="18">W</text>
    <line x1="68" y1="50" x2="120" y2="50" class="wire" marker-end="url(#arrow)" />

    <!-- D Flip-Flops -->
    <!-- Q2 -->
    <rect x="300" y="30" width="90" height="90" class="flipflop" />
    <text x="345" y="80" class="label" fill="#a67c00">D Flip-Flop Q2</text>
    <line x1="390" y1="75" x2="440" y2="75" class="wire" marker-end="url(#arrow)" />
    <text x="445" y="80" font-size="12">Q2</text>

    <!-- Q1 -->
    <rect x="300" y="160" width="90" height="90" class="flipflop" />
    <text x="345" y="210" class="label" fill="#a67c00">D Flip-Flop Q1</text>
    <line x1="390" y1="205" x2="440" y2="205" class="wire" marker-end="url(#arrow)" />
    <text x="445" y="210" font-size="12">Q1</text>

    <!-- Q0 -->
    <rect x="300" y="290" width="90" height="90" class="flipflop" />
    <text x="345" y="340" class="label" fill="#a67c00">D Flip-Flop Q0</text>
    <line x1="390" y1="335" x2="440" y2="335" class="wire" marker-end="url(#arrow)" />
    <text x="445" y="340" font-size="12">Q0</text>

    <!-- AND Gate for Q2' -->
    <rect x="120" y="30" width="90" height="60" class="gate" />
    <text x="165" y="65" class="label">AND (Q2')</text>
    <!-- Inputs -->
    <line x1="120" y1="50" x2="100" y2="50" class="wire" />
    <line x1="120" y1="70" x2="100" y2="70" class="wire" />
    <!-- Output -->
    <line x1="210" y1="60" x2="300" y2="75" class="wire" marker-end="url(#arrow)" />

    <!-- AND Gate for Q1' -->
    <rect x="120" y="160" width="90" height="60" class="gate" />
    <text x="165" y="195" class="label">AND (Q1')</text>
    <!-- Inputs -->
    <line x1="120" y1="180" x2="100" y2="180" class="wire" />
    <line x1="120" y1="200" x2="100" y2="200" class="wire" />
    <!-- Output -->
    <line x1="210" y1="190" x2="300" y2="205" class="wire" marker-end="url(#arrow)" />

    <!-- OR Gate for Q1' -->
    <rect x="460" y="160" width="90" height="60" class="gate" />
    <text x="505" y="195" class="label">OR (Q1')</text>
    <!-- Inputs -->
    <line x1="460" y1="180" x2="440" y2="180" class="wire" />
    <line x1="460" y1="200" x2="440" y2="200" class="wire" />
    <!-- Output -->
    <line x1="550" y1="190" x2="600" y2="190" class="wire" marker-end="url(#arrow)" />

    <!-- XOR Gate for Q0' -->
    <rect x="120" y="290" width="90" height="60" class="gate" />
    <text x="165" y="325" class="label">XOR (Q0')</text>
    <!-- Inputs -->
    <line x1="120" y1="310" x2="100" y2="310" class="wire" />
    <line x1="120" y1="330" x2="100" y2="330" class="wire" />
    <!-- Output -->
    <line x1="210" y1="320" x2="300" y2="335" class="wire" marker-end="url(#arrow)" />

    <!-- AND Gate for Z -->
    <rect x="650" y="100" width="90" height="60" class="gate" />
    <text x="695" y="135" class="label">AND (Z)</text>
    <!-- Inputs -->
    <line x1="650" y1="120" x2="630" y2="120" class="wire" />
    <line x1="650" y1="140" x2="630" y2="140" class="wire" />
    <!-- Output -->
    <line x1="740" y1="130" x2="800" y2="130" class="wire" marker-end="url(#arrow)" />

    <!-- Output Z -->
    <circle cx="830" cy="130" r="18" class="output-circle" />
    <text x="830" y="135" text-anchor="middle" fill="#fff" font-weight="bold" font-size="18">Z</text>

    <!-- Connections from Flip-Flops outputs (Q) back to gates -->
    <!-- Q2 output -->
    <line x1="440" y1="75" x2="460" y2="50" class="wire" />
    <line x1="460" y1="50" x2="210" y2="50" class="wire" />
    <line x1="210" y1="50" x2="120" y2="50" class="wire" />

    <!-- Q1 output -->
    <line x1="440" y1="205" x2="460" y2="230" class="wire" />
    <line x1="460" y1="230" x2="550" y2="230" class="wire" />
    <line x1="550" y1="230" x2="460" y2="190" class="wire" />

    <!-- Q0 output -->
    <line x1="440" y1="335" x2="460" y2="360" class="wire" />
    <line x1="460" y1="360" x2="210" y2="360" class="wire" />
    <line x1="210" y1="360" x2="120" y2="360" class="wire" />

    <!-- W input branching to gates -->
    <line x1="120" y1="50" x2="100" y2="50" class="wire" />
    <line x1="120" y1="180" x2="100" y2="50" class="wire" />
    <line x1="120" y1="310" x2="100" y2="50" class="wire" />

    <!-- Connections to AND gate for Z -->
    <line x1="600" y1="75" x2="630" y2="120" class="wire" />
    <line x1="600" y1="205" x2="630" y2="140" class="wire" />

    <!-- Arrow marker definition -->
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L10,5 L0,10 L2,5 z" fill="#000" />
      </marker>
    </defs>

  </svg>
</body>
</html>
