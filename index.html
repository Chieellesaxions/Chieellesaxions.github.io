<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Schematic Detektor Urutan 1110</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f9f9f9;
    }
    svg {
      border: 1px solid #ccc;
      background: #fff;
    }
    .gate {
      fill: #e0e0e0;
      stroke: #333;
      stroke-width: 2;
    }
    .text-label {
      font-size: 14px;
      font-weight: bold;
      user-select: none;
    }
    .wire {
      stroke: #000;
      stroke-width: 2;
      fill: none;
    }
  </style>
</head>
<body>
  <h2>Schematic Detektor Urutan Bit 1110 (Input W, Output Z)</h2>
  <svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">

    <!-- Input W -->
    <circle cx="50" cy="50" r="15" fill="#4caf50" />
    <text x="50" y="55" text-anchor="middle" fill="#fff" font-weight="bold" font-size="16">W</text>
    <line x1="65" y1="50" x2="120" y2="50" class="wire" />

    <!-- AND Gate for Q2' -->
    <rect x="120" y="20" width="80" height="60" rx="10" ry="10" class="gate" />
    <text x="160" y="55" class="text-label">AND</text>
    <!-- Inputs to AND gate Q2' -->
    <line x1="120" y1="35" x2="100" y2="35" class="wire" />
    <line x1="120" y1="65" x2="100" y2="65" class="wire" />
    <!-- Output from AND gate Q2' -->
    <line x1="200" y1="50" x2="250" y2="50" class="wire" marker-end="url(#arrow)" />

    <!-- AND Gate for Q1' -->
    <rect x="120" y="120" width="80" height="60" rx="10" ry="10" class="gate" />
    <text x="160" y="155" class="text-label">AND</text>
    <line x1="120" y1="135" x2="100" y2="135" class="wire" />
    <line x1="120" y1="165" x2="100" y2="165" class="wire" />
    <line x1="200" y1="150" x2="250" y2="150" class="wire" marker-end="url(#arrow)" />

    <!-- OR Gate for Q1' -->
    <rect x="260" y="120" width="80" height="60" rx="10" ry="10" class="gate" />
    <text x="300" y="155" class="text-label">OR</text>
    <line x1="260" y1="135" x2="240" y2="135" class="wire" />
    <line x1="260" y1="165" x2="240" y2="165" class="wire" />
    <line x1="340" y1="150" x2="390" y2="150" class="wire" marker-end="url(#arrow)" />

    <!-- XOR Gate for Q0' -->
    <rect x="120" y="220" width="80" height="60" rx="10" ry="10" class="gate" />
    <text x="160" y="255" class="text-label">XOR</text>
    <line x1="120" y1="235" x2="100" y2="235" class="wire" />
    <line x1="120" y1="265" x2="100" y2="265" class="wire" />
    <line x1="200" y1="250" x2="250" y2="250" class="wire" marker-end="url(#arrow)" />

    <!-- AND Gate for Z -->
    <rect x="600" y="50" width="80" height="60" rx="10" ry="10" class="gate" />
    <text x="640" y="85" class="text-label">AND</text>
    <line x1="600" y1="65" x2="580" y2="65" class="wire" />
    <line x1="600" y1="95" x2="580" y2="95" class="wire" />
    <line x1="680" y1="80" x2="730" y2="80" class="wire" marker-end="url(#arrow)" />

    <!-- D Flip-Flops -->
    <!-- Q2 Flip-Flop -->
    <rect x="250" y="20" width="80" height="80" rx="10" ry="10" fill="#bbdefb" stroke="#0d47a1" stroke-width="2" />
    <text x="290" y="60" class="text-label" fill="#0d47a1">D FF Q2</text>
    <line x1="330" y1="60" x2="380" y2="60" class="wire" marker-end="url(#arrow)" />
    <text x="385" y="65" font-size="12">Q2</text>

    <!-- Q1 Flip-Flop -->
    <rect x="250" y="120" width="80" height="80" rx="10" ry="10" fill="#bbdefb" stroke="#0d47a1" stroke-width="2" />
    <text x="290" y="160" class="text-label" fill="#0d47a1">D FF Q1</text>
    <line x1="330" y1="160" x2="380" y2="160" class="wire" marker-end="url(#arrow)" />
    <text x="385" y="165" font-size="12">Q1</text>

    <!-- Q0 Flip-Flop -->
    <rect x="250" y="220" width="80" height="80" rx="10" ry="10" fill="#bbdefb" stroke="#0d47a1" stroke-width="2" />
    <text x="290" y="260" class="text-label" fill="#0d47a1">D FF Q0</text>
    <line x1="330" y1="260" x2="380" y2="260" class="wire" marker-end="url(#arrow)" />
    <text x="385" y="265" font-size="12">Q0</text>

    <!-- Feedback lines from Q outputs to gates -->
    <line x1="380" y1="60" x2="420" y2="35" class="wire" />
    <line x1="380" y1="160" x2="420" y2="65" class="wire" />
    <line x1="380" y1="260" x2="420" y2="95" class="wire" />

    <!-- W input branching -->
    <line x1="120" y1="35" x2="100" y2="50" class="wire" />
    <line x1="120" y1="65" x2="100" y2="50" class="wire" />
    <line x1="120" y1="135" x2="100" y2="50" class="wire" />
    <line x1="120" y1="165" x2="100" y2="50" class="wire" />
    <line x1="120" y1="235" x2="100" y2="50" class="wire" />
    <line x1="120" y1="265" x2="100" y2="50" class="wire" />
    <line x1="580" y1="65" x2="420" y2="35" class="wire" />
    <line x1="580" y1="95" x2="420" y2="95" class="wire" />

    <!-- Output Z -->
    <circle cx="750" cy="80" r="15" fill="#f44336" />
    <text x="750" y="85" text-anchor="middle" fill="#fff" font-weight="bold" font-size="16">Z</text>

    <!-- Arrow marker definition -->
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L10,5 L0,10 L2,5 z" fill="#000" />
      </marker>
    </defs>

  </svg>
</body>
</html>
